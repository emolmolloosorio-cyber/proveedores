<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestión de Proveedores</title>
    <style>
        :root {
            --color-primario: #1a73e8;
            --color-primario-hover: #1557b0;
            --color-eliminar: #dc3545;
            --color-eliminar-hover: #b02a37;
            --color-editar: #ffc107;
            --color-editar-hover: #d4a000;
            --color-fondo: #f5f5f5;
            --color-blanco: #ffffff;
            --color-texto: #333333;
            --color-borde: #dddddd;
            --sombra: 0 2px 8px rgba(0, 0, 0, 0.1);
            --border-radius: 8px;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--color-fondo);
            color: var(--color-texto);
            line-height: 1.6;
            padding: 20px;
        }

        .contenedor {
            max-width: 900px;
            margin: 0 auto;
        }

        header {
            text-align: center;
            margin-bottom: 30px;
        }

        header h1 {
            font-size: 28px;
            color: var(--color-primario);
        }

        .formulario-contenedor {
            background-color: var(--color-blanco);
            padding: 25px;
            border-radius: var(--border-radius);
            box-shadow: var(--sombra);
            margin-bottom: 25px;
        }

        .formulario-contenedor h2 {
            margin-bottom: 20px;
            font-size: 20px;
        }

        .form-grupo {
            margin-bottom: 15px;
        }

        .form-grupo label {
            display: block;
            font-weight: 600;
            margin-bottom: 5px;
        }

        .form-grupo input {
            width: 100%;
            padding: 10px 12px;
            border: 1px solid var(--color-borde);
            border-radius: 5px;
            font-size: 16px;
            transition: border-color 0.2s;
        }

        .form-grupo input:focus {
            outline: none;
            border-color: var(--color-primario);
        }

        .btn-guardar {
            width: 100%;
            padding: 12px;
            background-color: var(--color-primario);
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: background-color 0.2s;
        }

        .btn-guardar:hover {
            background-color: var(--color-primario-hover);
        }

        .acciones-barra {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }

        .buscar-input {
            flex: 2;
            min-width: 200px;
            padding: 10px 12px;
            border: 1px solid var(--color-borde);
            border-radius: 5px;
            font-size: 16px;
        }

        .buscar-input:focus {
            outline: none;
            border-color: var(--color-primario);
        }

        .btn-accion {
            flex: 1;
            min-width: 120px;
            padding: 10px;
            border: none;
            border-radius: 5px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: opacity 0.2s;
        }

        .btn-accion:hover {
            opacity: 0.9;
        }

        .btn-exportar {
            background-color: #4CAF50;
            color: white;
        }

        .btn-importar {
            background-color: #2196F3;
            color: white;
        }

        .lista-proveedores {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .proveedor-card {
            background-color: var(--color-blanco);
            padding: 18px 20px;
            border-radius: var(--border-radius);
            box-shadow: var(--sombra);
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 12px;
        }

        .proveedor-info h3 {
            margin-bottom: 4px;
        }

        .proveedor-info p {
            color: #666;
            font-size: 14px;
        }

        .proveedor-acciones {
            display: flex;
            gap: 8px;
        }

        .btn-editar,
        .btn-eliminar {
            padding: 8px 16px;
            border: none;
            border-radius: 5px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: opacity 0.2s;
        }

        .btn-editar {
            background-color: var(--color-editar);
            color: #333;
        }

        .btn-editar:hover {
            background-color: var(--color-editar-hover);
        }

        .btn-eliminar {
            background-color: var(--color-eliminar);
            color: white;
        }

        .btn-eliminar:hover {
            background-color: var(--color-eliminar-hover);
        }

        .sin-resultados {
            text-align: center;
            color: #888;
            padding: 30px;
        }

        @media (max-width: 600px) {
            .proveedor-card {
                flex-direction: column;
                align-items: flex-start;
            }

            .proveedor-acciones {
                width: 100%;
            }

            .btn-editar,
            .btn-eliminar {
                flex: 1;
                text-align: center;
            }

            .acciones-barra {
                flex-direction: column;
            }
        }
    </style>
</head>
<body>
    <div class="contenedor">
        <header>
            <h1>Gestión de Proveedores</h1>
        </header>

        <div class="formulario-contenedor">
            <h2 id="titulo-formulario">Nuevo Proveedor</h2>
            <form id="form-proveedor">
                <div class="form-grupo">
                    <label for="nombre">Nombre *</label>
                    <input type="text" id="nombre" placeholder="Nombre del proveedor" required>
                </div>
                <div class="form-grupo">
                    <label for="contacto">Persona de contacto</label>
                    <input type="text" id="contacto" placeholder="Nombre de la persona">
                </div>
                <div class="form-grupo">
                    <label for="telefono">Teléfono</label>
                    <input type="text" id="telefono" placeholder="Número de teléfono">
                </div>
                <div class="form-grupo">
                    <label for="email">Email</label>
                    <input type="email" id="email" placeholder="Correo electrónico">
                </div>
                <button type="submit" class="btn-guardar" id="btn-guardar">Guardar Proveedor</button>
            </form>
        </div>

        <div class="acciones-barra">
            <input type="text" id="buscar-proveedor" class="buscar-input" placeholder="Buscar proveedor...">
            <button type="button" id="btn-exportar" class="btn-accion btn-exportar">📥 Respaldo</button>
            <button type="button" id="btn-importar" class="btn-accion btn-importar">📤 Restaurar</button>
        </div>

        <div id="lista-proveedores" class="lista-proveedores"></div>
    </div>

    <script>
        let proveedores = [];
        let proveedorEditandoId = null;

        document.addEventListener('DOMContentLoaded', () => {
            cargarProveedores();
            mostrarProveedores();
            configurarFormulario();
            configurarBusqueda();
            configurarBotonesRespaldo();
        });

        function cargarProveedores() {
            const datos = localStorage.getItem('proveedores');
            if (datos) {
                proveedores = JSON.parse(datos);
            }
        }

        function guardarProveedores() {
            localStorage.setItem('proveedores', JSON.stringify(proveedores));
        }

        function generarId() {
            return Date.now().toString(36) + Math.random().toString(36).substring(2);
        }

        function configurarFormulario() {
            const form = document.getElementById('form-proveedor');
            form.addEventListener('submit', manejarEnvioFormulario);
        }

        function manejarEnvioFormulario(evento) {
            evento.preventDefault();

            const nombre = document.getElementById('nombre').value.trim();
            const contacto = document.getElementById('contacto').value.trim();
            const telefono = document.getElementById('telefono').value.trim();
            const email = document.getElementById('email').value.trim();

            if (!nombre) {
                alert('El nombre del proveedor es obligatorio.');
                document.getElementById('nombre').focus();
                return;
            }

            if (proveedorEditandoId) {
                const proveedor = proveedores.find(p => p.id === proveedorEditandoId);
                if (proveedor) {
                    proveedor.nombre = nombre;
                    proveedor.contacto = contacto;
                    proveedor.telefono = telefono;
                    proveedor.email = email;
                }
                proveedorEditandoId = null;
                document.getElementById('btn-guardar').textContent = 'Guardar Proveedor';
                document.getElementById('titulo-formulario').textContent = 'Nuevo Proveedor';
            } else {
                const nuevoProveedor = {
                    id: generarId(),
                    nombre: nombre,
                    contacto: contacto,
                    telefono: telefono,
                    email: email,
                    fechaRegistro: new Date().toISOString()
                };
                proveedores.push(nuevoProveedor);
            }

            guardarProveedores();
            limpiarFormulario();
            mostrarProveedores();
        }

        function mostrarProveedores(listaFiltrada = null) {
            const lista = listaFiltrada || proveedores;
            const contenedor = document.getElementById('lista-proveedores');

            if (lista.length === 0) {
                contenedor.innerHTML = '<p class="sin-resultados">No hay proveedores registrados.</p>';
                return;
            }

            contenedor.innerHTML = '';

            lista.forEach(proveedor => {
                const tarjeta = document.createElement('div');
                tarjeta.className = 'proveedor-card';
                tarjeta.innerHTML = `
                    <div class="proveedor-info">
                        <h3>${escapeHtml(proveedor.nombre)}</h3>
                        ${proveedor.contacto ? `<p><strong>Contacto:</strong> ${escapeHtml(proveedor.contacto)}</p>` : ''}
                        ${proveedor.telefono ? `<p><strong>Teléfono:</strong> ${escapeHtml(proveedor.telefono)}</p>` : ''}
                        ${proveedor.email ? `<p><strong>Email:</strong> ${escapeHtml(proveedor.email)}</p>` : ''}
                    </div>
                    <div class="proveedor-acciones">
                        <button onclick="editarProveedor('${proveedor.id}')" class="btn-editar">Editar</button>
                        <button onclick="eliminarProveedor('${proveedor.id}')" class="btn-eliminar">Eliminar</button>
                    </div>
                `;
                contenedor.appendChild(tarjeta);
            });
        }

        function escapeHtml(texto) {
            const div = document.createElement('div');
            div.textContent = texto;
            return div.innerHTML;
        }

        function editarProveedor(id) {
            const proveedor = proveedores.find(p => p.id === id);
            if (!proveedor) return;

            document.getElementById('nombre').value = proveedor.nombre;
            document.getElementById('contacto').value = proveedor.contacto || '';
            document.getElementById('telefono').value = proveedor.telefono || '';
            document.getElementById('email').value = proveedor.email || '';

            proveedorEditandoId = id;
            document.getElementById('btn-guardar').textContent = 'Actualizar Proveedor';
            document.getElementById('titulo-formulario').textContent = 'Editando Proveedor';

            document.getElementById('form-proveedor').scrollIntoView({ behavior: 'smooth' });
        }

        function eliminarProveedor(id) {
            const proveedor = proveedores.find(p => p.id === id);
            if (!proveedor) return;

            if (confirm(`¿Eliminar definitivamente a "${proveedor.nombre}"?`)) {
                proveedores = proveedores.filter(p => p.id !== id);
                guardarProveedores();

                if (proveedorEditandoId === id) {
                    limpiarFormulario();
                }

                mostrarProveedores();
            }
        }

        function limpiarFormulario() {
            document.getElementById('form-proveedor').reset();
            proveedorEditandoId = null;
            document.getElementById('btn-guardar').textContent = 'Guardar Proveedor';
            document.getElementById('titulo-formulario').textContent = 'Nuevo Proveedor';
        }

        function configurarBusqueda() {
            const campoBusqueda = document.getElementById('buscar-proveedor');
            if (campoBusqueda) {
                campoBusqueda.addEventListener('input', function () {
                    const texto = this.value.toLowerCase().trim();

                    if (texto === '') {
                        mostrarProveedores();
                        return;
                    }

                    const filtrados = proveedores.filter(p =>
                        p.nombre.toLowerCase().includes(texto) ||
                        (p.contacto && p.contacto.toLowerCase().includes(texto)) ||
                        (p.email && p.email.toLowerCase().includes(texto)) ||
                        (p.telefono && p.telefono.includes(texto))
                    );

                    mostrarProveedores(filtrados);
                });
            }
        }

        function configurarBotonesRespaldo() {
            document.getElementById('btn-exportar').addEventListener('click', exportarDatos);
            document.getElementById('btn-importar').addEventListener('click', importarDatos);
        }

        function exportarDatos() {
            if (proveedores.length === 0) {
                alert('No hay proveedores para respaldar.');
                return;
            }

            const datos = JSON.stringify(proveedores, null, 2);
            const blob = new Blob([datos], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            const enlace = document.createElement('a');
            enlace.href = url;
            enlace.download = `proveedores-respaldo-${new Date().toISOString().split('T')[0]}.json`;
            enlace.click();
            URL.revokeObjectURL(url);
        }

        function importarDatos() {
            const input = document.createElement('input');
            input.type = 'file';
            input.accept = '.json';

            input.onchange = function (e) {
                const archivo = e.target.files[0];
                if (!archivo) return;

                const lector = new FileReader();
                lector.onload = function (evento) {
                    try {
                        const datosImportados = JSON.parse(evento.target.result);

                        if (!Array.isArray(datosImportados)) {
                            alert('El archivo no tiene un formato válido.');
                            return;
                        }

                        if (confirm(`¿Restaurar ${datosImportados.length} proveedores? Esto reemplazará la lista actual.`)) {
                            proveedores = datosImportados;
                            guardarProveedores();
                            limpiarFormulario();
                            mostrarProveedores();
                            alert('Proveedores restaurados correctamente.');
                        }
                    } catch (error) {
                        alert('Error al leer el archivo. Asegúrate de que sea un JSON válido.');
                    }
                };
                lector.readAsText(archivo);
            };

            input.click();
        }
    </script>
</body>
</html>

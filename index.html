<script>
const DAYS=['Lun','Mar','Mié','Jue','Vie','Sáb','Dom'];
const DAYS_FULL=['Lunes','Martes','Miércoles','Jueves','Viernes','Sábado','Domingo'];
const SUPABASE_URL='https://qvpswuskjtdopkmqhjoh.supabase.co';
const SUPABASE_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InF2cHN3dXNranRkb3BrbXFoam9oIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc3MjEwOTMsImV4cCI6MjA5MzI5NzA5M30.oQCVGQ8ypdUUfxk_Hc00_52hAl9dBjdiBGFyu6m3DDY';
const sb=window.supabase?.createClient(SUPABASE_URL,SUPABASE_KEY);
const DB_ROW_ID=1;
let DB={proveedores:[],pedidos:[],historial:[],faltantes:[],config:{}};
let _saveTimer=null,_asignarFaltanteId=null,_selectedFaltanteProdId=null,_selectedFaltanteProvId=null;

function escapeHTML(v){return String(v??'').replace(/[&<>"']/g,ch=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[ch]));}
function escapeAttr(v){return escapeHTML(v).replace(/`/g,'&#96;');}
function normalizeDB(d){
  const n=(d&&typeof d==='object')?d:{};
  n.proveedores=Array.isArray(n.proveedores)?n.proveedores:[];
  n.pedidos=Array.isArray(n.pedidos)?n.pedidos:[];
  n.historial=Array.isArray(n.historial)?n.historial:[];
  n.faltantes=Array.isArray(n.faltantes)?n.faltantes:[];
  n.config=(n.config&&typeof n.config==='object')?n.config:{};
  n.proveedores.forEach(p=>{if(!Array.isArray(p.catalogo))p.catalogo=[];});
  n.historial.forEach(h=>{(h.items||[]).forEach(i=>{if(i.precioVenta===undefined)i.precioVenta=0;});});
  return n;
}
function loadLocalDB(){try{const r=localStorage.getItem('bodega_db');return r?normalizeDB(JSON.parse(r)):normalizeDB(DB);}catch(_){return normalizeDB(DB);}}
function renderAll(){renderDashboard();renderProveedores();renderHoy();renderPedidos();renderHistorial();renderFaltantesList();}
async function loadDB(){DB=loadLocalDB();renderAll();if(!sb){toast('Sin conexión');return;}try{const{data,error}=await Promise.race([sb.from('bodega').select('data').eq('id',DB_ROW_ID).single(),new Promise((_,r)=>setTimeout(()=>r(new Error('timeout')),4500))]);if(error&&error.code==='PGRST116'){await sb.from('bodega').insert({id:DB_ROW_ID,data:DB});}else if(data){DB=normalizeDB(data.data);try{localStorage.setItem('bodega_db',JSON.stringify(DB));}catch(_){}}}catch(e){console.warn(e);}renderAll();}
function saveDB(){DB=normalizeDB(DB);try{localStorage.setItem('bodega_db',JSON.stringify(DB));}catch(_){}if(!sb)return;clearTimeout(_saveTimer);_saveTimer=setTimeout(async()=>{try{await sb.from('bodega').upsert({id:DB_ROW_ID,data:DB});}catch(e){}},600);}
function uid(){return Date.now().toString(36)+Math.random().toString(36).slice(2,7);}
function toast(m){const t=document.getElementById('toast');t.textContent=m;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2400);}
function confirm_(t,m,c){document.getElementById('confirmTitle').textContent=t;document.getElementById('confirmText').textContent=m;document.getElementById('confirmOverlay').classList.add('open');document.getElementById('confirmOk').onclick=()=>{closeConfirm();c();};}
function closeConfirm(){document.getElementById('confirmOverlay').classList.remove('open');}
function openSheet(id){document.getElementById(id).classList.add('open');}
function closeSheet(id){document.getElementById(id).classList.remove('open');}
function renderDayPicker(cid,sel=[]){document.getElementById(cid).innerHTML=DAYS.map((d,i)=>`<div class="day-chip ${sel.includes(i)?'selected':''}" onclick="this.classList.toggle('selected')">${d}</div>`).join('');}
function getSelectedDays(cid){return[...document.querySelectorAll(`#${cid} .day-chip.selected`)].map(el=>DAYS.indexOf(el.textContent));}
function goSection(nm,btn){document.querySelectorAll('.section').forEach(s=>s.classList.remove('active'));document.querySelectorAll('.nav-btn').forEach(b=>b.classList.remove('active'));document.getElementById('sec-'+nm).classList.add('active');btn.classList.add('active');if(nm==='dashboard')renderDashboard();if(nm==='proveedores')renderProveedores();if(nm==='hoy')renderHoy();if(nm==='pedidos')renderPedidos();if(nm==='historial')renderHistorial();if(nm==='reportes')renderReportes();}

// ── DASHBOARD ──
function renderDashboard(){const el=document.getElementById('dashContent');if(!el)return;const now=new Date();const sm=new Date(now.getFullYear(),now.getMonth(),1).getTime();const sw=Date.now()-7*24*60*60*1000;const gm=DB.historial.filter(h=>h.fecha>=sm).reduce((s,h)=>s+(h.total||0),0);const gs=DB.historial.filter(h=>h.fecha>=sw).reduce((s,h)=>s+(h.total||0),0);const pend=DB.pedidos.filter(p=>p.estado==='pendiente').length;const b=parseFloat(DB.config?.budget||0);const pct=b>0?Math.min(100,(gm/b)*100):0;const pc=pct>=90?'#c0392b':pct>=70?'#e67e22':'#27ae60';const fc=(DB.faltantes||[]).length;el.innerHTML=`${b>0?`<div class="dash-card" style="background:var(--accent-bg);color:var(--accent-text)"><div class="dash-card-title" style="color:rgba(255,255,255,0.6)">Presupuesto del mes</div><div style="display:flex;justify-content:space-between;align-items:baseline"><div class="dash-stat">S/. ${gm.toFixed(0)}</div><div style="font-size:13px;opacity:0.7">de S/. ${b.toFixed(0)}</div></div><div style="height:8px;background:rgba(255,255,255,0.2);border-radius:4px;overflow:hidden;margin-top:12px"><div style="height:100%;width:${pct.toFixed(1)}%;background:${pc};border-radius:4px"></div></div><div style="font-size:12px;opacity:0.6;margin-top:6px">${pct.toFixed(0)}% usado · queda S/. ${Math.max(0,b-gm).toFixed(0)}</div></div>`:`<div class="dash-card"><div class="dash-card-title">Gasto este mes</div><div class="dash-stat">S/. ${gm.toFixed(2)}</div></div>`}<div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:12px"><div class="dash-card"><div class="dash-card-title">Esta semana</div><div style="font-size:22px;font-weight:700;font-family:'Geist Mono',monospace">S/. ${gs.toFixed(0)}</div></div><div class="dash-card" style="cursor:pointer" onclick="document.querySelectorAll('.nav-btn')[2].click()"><div class="dash-card-title">Pendientes</div><div style="font-size:22px;font-weight:700;font-family:'Geist Mono',monospace">${pend}</div></div></div><div class="dash-card" style="cursor:pointer;background:${fc>0?'#fff8e1':'var(--bg2)'};border-color:${fc>0?'#f0c040':'var(--border)'}" onclick="openFaltantes()"><div style="display:flex;justify-content:space-between;align-items:center"><div><div class="dash-card-title">📋 Faltantes</div><div style="font-size:13px;color:var(--text2)">${fc>0?`${fc} producto${fc!==1?'s':''}`:'Lista vacía'}</div></div>${fc>0?`<div style="font-size:22px;font-weight:700;font-family:'Geist Mono',monospace;color:#c7910b">${fc}</div>`:''}</div></div><div class="dash-card" style="cursor:pointer;padding:0;overflow:hidden" onclick="toggleDashCard('dashSemana',this)"><div style="padding:16px 18px"><div class="dash-card-title">📅 Semana</div><div style="font-size:13px;color:var(--text2)">Visitas y entregas por día</div></div><div id="dashSemana" style="display:none;border-top:1px solid var(--border);padding:12px 18px 16px"><div id="dashSemanaContent"></div></div></div><div class="dash-card" style="cursor:pointer;padding:0;overflow:hidden" onclick="toggleDashCard('dashReportes',this)"><div style="padding:16px 18px"><div class="dash-card-title">📊 Reportes</div><div style="font-size:13px;color:var(--text2)">Gasto por proveedor y producto</div></div><div id="dashReportes" style="display:none;border-top:1px solid var(--border);padding:0 18px 16px"><div style="display:flex;gap:6px;padding:12px 0 8px"><button class="btn btn-sm" id="dRBtn30" onclick="setDashReporte(30,this);event.stopPropagation()" style="background:var(--accent-bg);color:var(--accent-text);border-radius:20px">30d</button><button class="btn btn-sm" id="dRBtn60" onclick="setDashReporte(60,this);event.stopPropagation()" style="background:var(--bg2);color:var(--text2);border-radius:20px;border:1px solid var(--border)">60d</button><button class="btn btn-sm" id="dRBtn90" onclick="setDashReporte(90,this);event.stopPropagation()" style="background:var(--bg2);color:var(--text2);border-radius:20px;border:1px solid var(--border)">90d</button></div><div id="dashReportesContent"></div></div></div><button class="btn btn-primary btn-full" style="margin-top:4px" onclick="document.querySelectorAll('.nav-btn')[2].click();setTimeout(openNewOrder,100)">+ Nuevo pedido</button>`;}
function toggleDashCard(id){const p=document.getElementById(id);p.style.display=p.style.display==='none'?'block':'none';if(p.style.display==='block'){if(id==='dashSemana')renderDashSemana();if(id==='dashReportes')renderDashReportes();}}
let _dsd=jsDayToIdx(new Date().getDay()),_drd=30;
function renderDashSemana(){const el=document.getElementById('dashSemanaContent');el.innerHTML=`<div style="display:flex;overflow-x:auto;gap:5px;padding:4px 0 12px">${DAYS.map((d,i)=>`<div class="day-tab ${i===_dsd?'active':''}" onclick="_dsd=${i};renderDashSemana()" style="font-size:12px;padding:5px 10px">${d}${i===jsDayToIdx(new Date().getDay())?' ·':''}</div>`).join('')}</div><div id="dashDayContent"></div>`;renderDashDayContent();}
function renderDashDayContent(){const el=document.getElementById('dashDayContent');const v=DB.proveedores.filter(p=>(p.diasVisita||[]).includes(_dsd));const e=DB.proveedores.filter(p=>(p.diasEntrega||[]).includes(_dsd));const mk=a=>a.length?a.map(p=>`<div style="display:flex;justify-content:space-between;padding:7px 0;border-bottom:1px solid var(--border)"><span style="font-weight:600;font-size:14px">${escapeHTML(p.nombre)}</span>${p.telefono?`<span style="font-size:12px;color:var(--text3)">${escapeHTML(p.telefono)}</span>`:''}</div>`).join(''):'<div style="color:var(--text3);font-size:13px;padding:6px 0">Ninguno.</div>';el.innerHTML=`<div style="font-size:11px;text-transform:uppercase;color:var(--text3);font-weight:700;margin-bottom:6px">🚶 Visitan — ${DAYS_FULL[_dsd]}</div>${mk(v)}<div style="font-size:11px;text-transform:uppercase;color:var(--text3);font-weight:700;margin:12px 0 6px">🚚 Entregan — ${DAYS_FULL[_dsd]}</div>${mk(e)}`;}
function setDashReporte(d,btn){_drd=d;document.querySelectorAll('[id^=dRBtn]').forEach(b=>{b.style.background='var(--bg2)';b.style.color='var(--text2)';b.style.border='1px solid var(--border)';});btn.style.background='var(--accent-bg)';btn.style.color='var(--accent-text)';btn.style.border='none';renderDashReportes();}
function renderDashReportes(){const el=document.getElementById('dashReportesContent');const desde=Date.now()-_drd*24*60*60*1000;const compras=DB.historial.filter(h=>h.fecha>=desde);if(!compras.length){el.innerHTML='<div style="color:var(--text3);font-size:14px;padding:8px 0">Sin compras.</div>';return;}const pp={};compras.forEach(h=>{if(!pp[h.proveedorId])pp[h.proveedorId]={total:0};pp[h.proveedorId].total+=h.total||0;});const tg=Object.values(pp).reduce((s,v)=>s+v.total,0);const pr=Object.entries(pp).sort((a,b)=>b[1].total-a[1].total);const po={};compras.forEach(h=>{h.items.filter(i=>i.qty>0).forEach(i=>{if(!po[i.nombre])po[i.nombre]={qty:0,gasto:0,unidad:i.unidad};po[i.nombre].qty+=i.qty;po[i.nombre].gasto+=i.qty*(i.precio||0);});});const pk=Object.entries(po).sort((a,b)=>b[1].gasto-a[1].gasto).slice(0,5);el.innerHTML=`<div style="background:var(--bg3);border-radius:10px;padding:12px;margin-bottom:10px;display:flex;justify-content:space-between"><span>${compras.length} compras</span><span class="money" style="font-weight:700">S/. ${tg.toFixed(2)}</span></div>${pr.map(([pid,d])=>{const pv=DB.proveedores.find(x=>x.id===pid);const pct=tg>0?(d.total/tg*100):0;return`<div style="margin-bottom:10px"><div style="display:flex;justify-content:space-between;font-size:13px"><span>${escapeHTML(pv?.nombre||'?')}</span><span class="money">S/.${d.total.toFixed(2)}</span></div><div style="height:5px;background:var(--bg3);border-radius:3px"><div style="height:100%;width:${pct}%;background:var(--accent-bg);border-radius:3px"></div></div></div>`;}).join('')}<div style="font-size:11px;text-transform:uppercase;color:var(--text3);font-weight:700;margin:14px 0 8px">Top productos</div>${pk.map(([n,d],i)=>`<div style="display:flex;justify-content:space-between;padding:6px 0;border-bottom:1px solid var(--border);font-size:13px"><span>${i+1}. ${escapeHTML(n)}</span><span class="money">S/.${d.gasto.toFixed(2)}</span></div>`).join('')}`;}
function openBudgetSettings(){document.getElementById('fBudget').value=DB.config?.budget||'';openSheet('overlayBudget');}
function saveBudget(clr){if(!DB.config)DB.config={};DB.config.budget=clr?0:parseFloat(document.getElementById('fBudget').value)||0;saveDB();closeSheet('overlayBudget');renderDashboard();toast(DB.config.budget>0?`Presupuesto: S/. ${DB.config.budget}`:'Presupuesto eliminado');}

// ── FALTANTES ──
function openFaltantes(){if(!DB.faltantes)DB.faltantes=[];document.getElementById('fFaltanteNombre').value='';document.getElementById('fFaltanteQty').value='';_selectedFaltanteProdId=null;_selectedFaltanteProvId=null;renderFaltantesList();openSheet('overlayFaltantes');}
function buscarEnCatalogos(q){_selectedFaltanteProdId=null;_selectedFaltanteProvId=null;const dd=document.getElementById('acDropdown');const qt=q.toLowerCase().trim();if(qt.length<1){dd.classList.remove('show');return;}const res=[];DB.proveedores.forEach(p=>{(p.catalogo||[]).forEach(pr=>{if(pr.nombre.toLowerCase().includes(qt))res.push({prodId:pr.id,provId:p.id,provNombre:p.nombre,nombre:pr.nombre,unidad:pr.unidad||'unidad',precio:pr.precio||0});});});const lim=res.slice(0,12);dd.innerHTML=lim.map(r=>`<div class="autocomplete-item" onclick="seleccionarFaltante('${escapeAttr(r.prodId)}','${escapeAttr(r.provId)}','${escapeAttr(r.nombre)}','${escapeAttr(r.unidad)}',${r.precio})"><div><div class="ac-name">${resaltar(r.nombre,qt)}</div><div class="ac-meta">${escapeHTML(r.unidad)} · ${escapeHTML(r.provNombre)}</div></div><div class="ac-price">${r.precio>0?'S/. '+r.precio.toFixed(2):''}</div></div>`).join('');dd.innerHTML+=`<div class="autocomplete-item" onclick="agregarProductoNuevo('${escapeAttr(q)}')" style="background:var(--bg2);border-top:2px solid var(--border)"><div><div class="ac-name">✨ Agregar "${escapeHTML(q)}"</div><div class="ac-meta">No está en ningún catálogo</div></div></div>`;dd.classList.add('show');}
function resaltar(t,q){const i=t.toLowerCase().indexOf(q.toLowerCase());if(i===-1)return escapeHTML(t);return escapeHTML(t.substring(0,i))+'<span class="ac-highlight">'+escapeHTML(t.substring(i,i+q.length))+'</span>'+escapeHTML(t.substring(i+q.length));}
function seleccionarFaltante(pid,prid,n,u,p){document.getElementById('fFaltanteNombre').value=n;document.getElementById('fFaltanteQty').value=u;_selectedFaltanteProdId=pid;_selectedFaltanteProvId=prid;document.getElementById('acDropdown').classList.remove('show');}
function agregarProductoNuevo(n){document.getElementById('acDropdown').classList.remove('show');document.getElementById('overlayQuickFaltante')?.remove();const nl=n.trim();const el=document.createElement('div');el.className='overlay open';el.id='overlayQuickFaltante';el.style.zIndex='400';el.innerHTML=`<div class="sheet" style="max-height:70dvh"><div class="sheet-handle"></div><div class="sheet-header"><span class="sheet-title">Producto nuevo</span><button class="btn btn-ghost" onclick="document.getElementById('overlayQuickFaltante').remove()">✕</button></div><div class="sheet-body"><div class="form-group"><label class="form-label">Nombre</label><input class="form-input" id="qfNombre" value="${escapeAttr(nl)}"></div><div class="form-group"><label class="form-label">Unidad</label><select class="form-select" id="qfUnidad"><option value="unidad">Unidad</option><option value="kg">Kg</option><option value="g">g</option><option value="litro">Litro</option><option value="ml">ml</option><option value="caja">Caja</option><option value="docena">Docena</option><option value="bolsa">Bolsa</option><option value="paquete">Paquete</option><option value="six">Six pack</option></select></div><div class="form-group"><label class="form-label">Precio (S/.)</label><div class="price-wrap"><span class="price-prefix">S/.</span><input class="form-input price-input" id="qfPrecio" type="number" step="0.01" min="0" placeholder="0.00"></div></div><div class="form-group"><label class="form-label">Proveedor</label><select class="form-select" id="qfProvId"><option value="">Seleccioná...</option>${DB.proveedores.sort((a,b)=>(a.nombre||'').localeCompare(b.nombre||'')).map(p=>`<option value="${escapeAttr(p.id)}">${escapeHTML(p.nombre)}</option>`).join('')}</select></div><div class="form-group"><label class="form-label">Cantidad (opcional)</label><input class="form-input" id="qfCantidad" placeholder="Ej: 5 kg"></div><button class="btn btn-primary btn-full" onclick="guardarProductoNuevo()">Agregar</button></div></div>`;el.addEventListener('click',function(e){if(e.target===this)this.remove();});document.body.appendChild(el);}
function guardarProductoNuevo(){const n=document.getElementById('qfNombre').value.trim();if(!n){toast('Nombre obligatorio');return;}const prid=document.getElementById('qfProvId').value;if(!prid){toast('Seleccioná proveedor');return;}const u=document.getElementById('qfUnidad').value;const p=parseFloat(document.getElementById('qfPrecio').value)||0;const c=document.getElementById('qfCantidad').value.trim();const pv=DB.proveedores.find(x=>x.id===prid);if(!pv.catalogo)pv.catalogo=[];const np={id:uid(),nombre:n,unidad:u,precio:p,totalQty:0,totalGasto:0};pv.catalogo.push(np);if(!DB.faltantes)DB.faltantes=[];DB.faltantes.push({id:uid(),nombre:n,cantidad:c,prodIdSugerido:np.id,provIdSugerido:prid,fecha:Date.now()});saveDB();document.getElementById('overlayQuickFaltante')?.remove();renderFaltantesList();renderDashboard();toast('Agregado ✓');}
function addFaltante(){const n=document.getElementById('fFaltanteNombre').value.trim();if(!n){toast('Nombre obligatorio');return;}if(!DB.faltantes)DB.faltantes=[];DB.faltantes.push({id:uid(),nombre:n,cantidad:document.getElementById('fFaltanteQty').value.trim()||'',prodIdSugerido:_selectedFaltanteProdId||null,provIdSugerido:_selectedFaltanteProvId||null,fecha:Date.now()});saveDB();document.getElementById('fFaltanteNombre').value='';document.getElementById('fFaltanteQty').value='';_selectedFaltanteProdId=null;_selectedFaltanteProvId=null;renderFaltantesList();renderDashboard();toast('Agregado');}
function removeFaltante(id){DB.faltantes=DB.faltantes.filter(f=>f.id!==id);saveDB();renderFaltantesList();renderDashboard();}
function renderFaltantesList(){const el=document.getElementById('faltantesList');if(!el)return;if(!DB.faltantes||!DB.faltantes.length){el.innerHTML='<div class="no-data" style="text-align:center;padding:20px">No hay productos pendientes.</div>';return;}el.innerHTML=DB.faltantes.map(f=>{const ps=f.provIdSugerido?DB.proveedores.find(p=>p.id===f.provIdSugerido):null;return`<div style="display:flex;align-items:center;justify-content:space-between;padding:10px 0;border-bottom:1px solid var(--border);gap:8px"><div style="flex:1"><div style="font-weight:600;font-size:14px">${escapeHTML(f.nombre)}</div>${f.cantidad?`<div style="font-size:12px;color:var(--text2)">${escapeHTML(f.cantidad)}</div>`:''}${ps?`<div style="font-size:11px;color:var(--text3)">📦 ${escapeHTML(ps.nombre)}</div>`:''}</div><button class="btn btn-sm" style="background:var(--accent-bg);color:var(--accent-text);padding:6px 12px;font-size:12px" onclick="openAsignarProv('${f.id}')">Asignar</button><button class="btn btn-ghost btn-sm" style="color:var(--danger);padding:4px" onclick="removeFaltante('${f.id}')">✕</button></div>`;}).join('');}
function openAsignarProv(fid){_asignarFaltanteId=fid;const b=document.getElementById('asignarProvBody');if(!DB.proveedores.length){b.innerHTML='<div class="empty-state"><div class="empty-text">No hay proveedores.</div></div>';}else{b.innerHTML=`<div style="font-size:13px;color:var(--text2);margin-bottom:14px">Elige el proveedor:</div>${DB.proveedores.sort((a,b)=>(a.nombre||'').localeCompare(b.nombre||'')).map(p=>`<div class="card" onclick="asignarFaltanteAProveedor('${escapeAttr(p.id)}')"><div class="card-body"><div class="card-title">${escapeHTML(p.nombre)}</div></div><svg class="chevron" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="9 18 15 12 9 6"/></svg></div>`).join('')}`;}openSheet('overlayAsignarProv');}
function asignarFaltanteAProveedor(pid){const f=DB.faltantes.find(x=>x.id===_asignarFaltanteId);if(!f)return;const p=DB.proveedores.find(x=>x.id===pid);if(!p)return;let cp=null;if(f.prodIdSugerido&&f.provIdSugerido===pid)cp=(p.catalogo||[]).find(c=>c.id===f.prodIdSugerido);if(!cp){const nb=f.nombre.toLowerCase().trim();cp=(p.catalogo||[]).find(c=>c.nombre.toLowerCase().trim()===nb);}if(!cp){const nb=f.nombre.toLowerCase().trim();cp=(p.catalogo||[]).find(c=>c.nombre.toLowerCase().includes(nb)||nb.includes(c.nombre.toLowerCase()));}let ped=DB.pedidos.find(x=>x.proveedorId===pid&&(x.estado==='pendiente'||x.estado==='borrador'));if(!ped){ped={id:uid(),proveedorId:pid,items:[],estado:'borrador',fecha:Date.now()};DB.pedidos.push(ped);}const ex=ped.items.find(i=>i.nombre.toLowerCase().trim()===f.nombre.toLowerCase().trim());if(ex){ex.qty=(ex.qty||0)+1;if(cp){ex.precio=cp.precio||ex.precio;ex.unidad=cp.unidad||ex.unidad;ex.prodId=cp.id;}}else{ped.items.push({prodId:cp?cp.id:(f.prodIdSugerido||uid()),nombre:f.nombre,unidad:cp?(cp.unidad||'unidad'):(f.cantidad||'unidad'),precio:cp?(cp.precio||0):0,qty:1});}DB.faltantes=DB.faltantes.filter(x=>x.id!==_asignarFaltanteId);saveDB();closeSheet('overlayAsignarProv');renderFaltantesList();renderDashboard();toast(cp?`Agregado al pedido de ${p.nombre} ✓`:'Agregado (revisá el precio)');_asignarFaltanteId=null;}
document.addEventListener('click',function(e){const w=document.querySelector('.autocomplete-wrap');if(w&&!w.contains(e.target))document.getElementById('acDropdown').classList.remove('show');});

// ── PROVEEDORES ──
let editProvId=null;
function renderProveedores(){const q=document.getElementById('searchProv').value.toLowerCase();const l=DB.proveedores.filter(p=>(p.nombre||'').toLowerCase().includes(q)).sort((a,b)=>(a.nombre||'').localeCompare(b.nombre||''));const el=document.getElementById('listProveedores');if(!l.length){el.innerHTML='<div class="empty-state"><div class="empty-icon">🏪</div><div class="empty-text">No hay proveedores.</div></div>';return;}el.innerHTML=l.map(p=>`<div class="card" onclick="openProvDetail('${escapeAttr(p.id)}')"><div class="card-body"><div class="card-title">${escapeHTML(p.nombre)}</div>${p.telefono?`<div class="card-sub">${escapeHTML(p.telefono)}</div>`:''}<div class="card-tags">${(p.diasVisita||[]).length?`<span class="tag tag-visit">Visita: ${p.diasVisita.map(d=>DAYS[d]).join(', ')}</span>`:''} ${(p.diasEntrega||[]).length?`<span class="tag tag-delivery">Entrega: ${p.diasEntrega.map(d=>DAYS[d]).join(', ')}</span>`:''} ${(p.catalogo||[]).length?`<span class="tag tag-count">${(p.catalogo||[]).length} prod.</span>`:''}</div></div><svg class="chevron" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="9 18 15 12 9 6"/></svg></div>`).join('');}
function openProvForm(id=null){editProvId=id;document.getElementById('provFormTitle').textContent=id?'Editar':'Nuevo proveedor';const p=id?DB.proveedores.find(x=>x.id===id):null;document.getElementById('fProvNombre').value=p?.nombre||'';document.getElementById('fProvTel').value=p?.telefono||'';document.getElementById('fProvObs').value=p?.observaciones||'';renderDayPicker('dpVisita',p?.diasVisita||[]);renderDayPicker('dpEntrega',p?.diasEntrega||[]);openSheet('overlayProvForm');}
function saveProveedor(){const n=document.getElementById('fProvNombre').value.trim();if(!n){toast('Nombre obligatorio');return;}const d={nombre:n,telefono:document.getElementById('fProvTel').value.trim(),observaciones:document.getElementById('fProvObs').value.trim(),diasVisita:getSelectedDays('dpVisita'),diasEntrega:getSelectedDays('dpEntrega')};if(editProvId){Object.assign(DB.proveedores.find(x=>x.id===editProvId),d);}else{DB.proveedores.push({id:uid(),catalogo:[],...d});}saveDB();closeSheet('overlayProvForm');renderProveedores();toast(editProvId?'Actualizado':'Agregado');editProvId=null;}
function openProvDetail(id){const p=DB.proveedores.find(x=>x.id===id);if(!p)return;const v=(p.diasVisita||[]).length?p.diasVisita.map(d=>DAYS_FULL[d]).join(', '):'No definido';const e=(p.diasEntrega||[]).length?p.diasEntrega.map(d=>DAYS_FULL[d]).join(', '):'No definido';const cat=[...(p.catalogo||[])].sort((a,b)=>(b.totalGasto||0)-(a.totalGasto||0));document.getElementById('sheetProvDetail').innerHTML=`<div class="sheet-handle"></div><div class="detail-header"><button class="back-btn" onclick="closeSheet('overlayProvDetail')"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="15 18 9 12 15 6"/></svg></button><div class="detail-info"><div class="detail-name">${escapeHTML(p.nombre)}</div>${p.telefono?`<div class="detail-phone">${escapeHTML(p.telefono)}</div>`:''}</div><button class="btn btn-ghost" onclick="closeSheet('overlayProvDetail');openProvForm('${escapeAttr(p.id)}')"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg></button></div><div class="detail-section"><div class="detail-section-title">Logística</div><div class="info-row"><span class="info-label">Visita</span><span class="info-value">${v}</span></div><div class="info-row"><span class="info-label">Entrega</span><span class="info-value">${e}</span></div></div>${p.observaciones?`<div class="detail-section"><div class="detail-section-title">Observaciones</div><div class="obs-box">${escapeHTML(p.observaciones)}</div></div>`:''}<div class="detail-section"><div class="detail-section-title">Catálogo (${cat.length})</div>${cat.length?cat.map(pr=>`<div class="product-item"><div class="product-info"><div class="product-name">${escapeHTML(pr.nombre)}</div><div class="product-unit">${escapeHTML(pr.unidad)}${getLastMonthQty(p.id,pr.id)>0?` · ${getLastMonthQty(p.id,pr.id)} últ. mes`:''}</div></div><div class="product-price">S/. ${parseFloat(pr.precio||0).toFixed(2)}</div><div class="product-actions"><button class="btn btn-ghost btn-sm" onclick="openCatForm('${escapeAttr(p.id)}','${escapeAttr(pr.id)}')"><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg></button><button class="btn btn-ghost btn-sm" style="color:var(--danger)" onclick="deleteProd('${escapeAttr(p.id)}','${escapeAttr(pr.id)}')"><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14H6L5 6"/><path d="M10 11v6"/><path d="M14 11v6"/></svg></button></div></div>`).join(''):'<div class="no-data">Sin productos.</div>'}<div style="display:flex;gap:8px;margin-top:14px"><button class="btn btn-secondary btn-sm" onclick="openCatForm('${escapeAttr(p.id)}')">+ Producto</button>${cat.length?`<button class="btn btn-primary btn-sm" onclick="closeSheet('overlayProvDetail');openNewOrder('${escapeAttr(p.id)}')">Armar pedido</button>`:''}</div></div><div class="detail-section"><button class="btn btn-danger btn-sm" onclick="deleteProveedor('${escapeAttr(p.id)}')">Eliminar proveedor</button></div>`;openSheet('overlayProvDetail');}
function deleteProveedor(id){confirm_('Eliminar','¿Eliminar este proveedor?',()=>{DB.proveedores=DB.proveedores.filter(x=>x.id!==id);saveDB();closeSheet('overlayProvDetail');renderProveedores();toast('Eliminado');});}

// ── CATÁLOGO ──
let editCatProvId=null,editCatProdId=null;
function openCatForm(pid,prid=null){editCatProvId=pid;editCatProdId=prid;document.getElementById('catFormTitle').textContent=prid?'Editar producto':'Nuevo producto';const p=DB.proveedores.find(x=>x.id===pid);const pr=prid?(p?.catalogo||[]).find(x=>x.id===prid):null;document.getElementById('fProdNombre').value=pr?.nombre||'';document.getElementById('fProdUnidad').value=pr?.unidad||'unidad';document.getElementById('fProdPrecio').value=pr?.precio||'';openSheet('overlayCatForm');}
function saveProd(){const n=document.getElementById('fProdNombre').value.trim();if(!n){toast('Nombre obligatorio');return;}const p=DB.proveedores.find(x=>x.id===editCatProvId);if(!p.catalogo)p.catalogo=[];const d={nombre:n,unidad:document.getElementById('fProdUnidad').value,precio:parseFloat(document.getElementById('fProdPrecio').value)||0};if(editCatProdId){Object.assign(p.catalogo.find(x=>x.id===editCatProdId),d);}else{p.catalogo.push({id:uid(),totalQty:0,totalGasto:0,...d});}saveDB();closeSheet('overlayCatForm');openProvDetail(editCatProvId);toast(editCatProdId?'Actualizado':'Agregado');}
function deleteProd(pid,prid){confirm_('Eliminar','¿Quitar este producto?',()=>{const p=DB.proveedores.find(x=>x.id===pid);p.catalogo=p.catalogo.filter(x=>x.id!==prid);saveDB();openProvDetail(pid);toast('Eliminado');});}

// ── SEMANA ──
function jsDayToIdx(d){return d===0?6:d-1;}
let selectedDayIdx=jsDayToIdx(new Date().getDay());
function renderHoy(){document.getElementById('dayTabs').innerHTML=DAYS.map((d,i)=>`<div class="day-tab ${i===selectedDayIdx?'active':''}" onclick="selectDay(${i},this)">${d}${i===jsDayToIdx(new Date().getDay())?' ·':''}</div>`).join('');renderHoyContent();}
function selectDay(i,el){selectedDayIdx=i;document.querySelectorAll('.day-tab').forEach(t=>t.classList.remove('active'));el.classList.add('active');renderHoyContent();}
function renderHoyContent(){const v=DB.proveedores.filter(p=>(p.diasVisita||[]).includes(selectedDayIdx));const e=DB.proveedores.filter(p=>(p.diasEntrega||[]).includes(selectedDayIdx));const mk=a=>a.length?a.map(p=>`<div class="card" onclick="openProvDetail('${escapeAttr(p.id)}')"><div class="card-body"><div class="card-title">${escapeHTML(p.nombre)}</div>${p.telefono?`<div class="card-sub">${escapeHTML(p.telefono)}</div>`:''}</div><svg class="chevron" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="9 18 15 12 9 6"/></svg></div>`).join(''):'<div class="no-data">Ninguno.</div>';document.getElementById('hoyContent').innerHTML=`<div class="day-block"><div class="day-block-title">🚶 Visitan — ${DAYS_FULL[selectedDayIdx]}</div>${mk(v)}<div class="day-block-title" style="margin-top:12px">🚚 Entregan — ${DAYS_FULL[selectedDayIdx]}</div>${mk(e)}</div>`;}

// ── PEDIDOS ──
let pedidoTab='pendientes',currentOrderProvId=null,currentOrderId=null;
function switchPedidoTab(tab,el){pedidoTab=tab;document.querySelectorAll('.section-tab').forEach(t=>t.classList.remove('active'));el.classList.add('active');renderPedidos();}
function renderPedidos(){const fl=DB.pedidos.filter(p=>pedidoTab==='pendientes'?p.estado==='pendiente':p.estado==='borrador').sort((a,b)=>b.fecha-a.fecha);const el=document.getElementById('listPedidos');if(!fl.length){el.innerHTML='<div class="empty-state"><div class="empty-icon">🛒</div><div class="empty-text">No hay pedidos.</div></div>';return;}el.innerHTML=fl.map(o=>{const p=DB.proveedores.find(x=>x.id===o.proveedorId);const t=calcOrderTotal(o);const f=new Date(o.fecha).toLocaleDateString('es-PE',{day:'2-digit',month:'short'});return`<div class="hist-card" onclick="openOrderDetail('${escapeAttr(o.id)}')"><div class="hist-top"><div><div class="hist-provider">${escapeHTML(p?.nombre||'?')}</div><div class="hist-date">${f}</div></div><div class="hist-total">≈ S/. ${t.toFixed(2)}</div></div></div>`;}).join('');}
function calcOrderTotal(o){return(o.items||[]).reduce((s,i)=>s+(i.qty||0)*(i.precio||0),0);}
function openNewOrder(pid=null){currentOrderId=null;currentOrderProvId=pid;buildOrderSheet(pid);openSheet('overlayOrder');}
function buildOrderSheet(pid){const s=document.getElementById('sheetOrder');if(!pid){const ps=DB.proveedores;s.innerHTML=`<div class="sheet-handle"></div><div class="sheet-header"><span class="sheet-title">Armar pedido</span><button class="btn btn-ghost" onclick="closeSheet('overlayOrder')">✕</button></div><div class="sheet-body">${!ps.length?'<div class="empty-state"><div class="empty-text">Agrega proveedores primero.</div></div>':`<div class="form-group"><label class="form-label">Proveedor</label><select class="form-select" id="orderProvSelect" onchange="updateOrderProv(this.value)"><option value="">Selecciona...</option>${ps.map(p=>`<option value="${escapeAttr(p.id)}">${escapeHTML(p.nombre)}</option>`).join('')}</select></div><div id="orderItemsArea"></div>`}</div>`;}else{_renderOrderSheet(pid,[]);}}
function _renderOrderSheet(pid,ex){const p=DB.proveedores.find(x=>x.id===pid);const s=document.getElementById('sheetOrder');s.innerHTML=`<div class="sheet-handle"></div><div class="sheet-header"><span class="sheet-title">${escapeHTML(p?.nombre)}</span><div style="display:flex;gap:2px"><button class="btn btn-ghost btn-sm" onclick="exportOrderPng('${escapeAttr(pid)}')"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg></button><button class="btn btn-ghost" onclick="closeSheet('overlayOrder')">✕</button></div></div><div style="overflow-y:auto;flex:1;padding-bottom:160px">${buildOrderItems(p,ex)}<div style="padding:16px 20px 4px"><button class="btn btn-secondary btn-full" onclick="openQuickAddProd('${escapeAttr(pid)}')"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg> Agregar producto nuevo</button></div></div><div class="total-bar" style="flex-direction:column;align-items:stretch;gap:10px"><div style="display:flex;justify-content:space-between"><span class="total-label">Total estimado</span><span class="total-amount" id="orderTotal">S/. 0.00</span></div><div style="display:flex;gap:8px"><button class="btn btn-secondary btn-sm" style="flex:1" onclick="saveOrder('borrador','${escapeAttr(pid)}')">Borrador</button><button class="btn btn-primary btn-sm" style="flex:2" onclick="saveOrder('pendiente','${escapeAttr(pid)}')">Guardar pedido</button></div></div>`;setTimeout(renderOrderTotal,50);}
function updateOrderProv(pid){if(!pid)return;currentOrderProvId=pid;const p=DB.proveedores.find(x=>x.id===pid);document.getElementById('orderItemsArea').innerHTML=buildOrderItems(p)+`<div style="padding:16px 20px 4px"><button class="btn btn-secondary btn-full" onclick="openQuickAddProd('${escapeAttr(pid)}')">+ Agregar producto nuevo</button></div><div style="display:flex;justify-content:space-between;padding:14px 20px;border-top:1px solid var(--border);margin-top:8px"><div><span class="total-label">Total</span><span class="total-amount" id="orderTotal">S/. 0.00</span></div><div style="display:flex;gap:8px"><button class="btn btn-secondary btn-sm" onclick="saveOrder('borrador','${escapeAttr(pid)}')">Borrador</button><button class="btn btn-primary btn-sm" onclick="saveOrder('pendiente','${escapeAttr(pid)}')">Guardar</button></div></div>`;}
function buildOrderItems(p,ex=[]){if(!p)return'<div style="padding:20px;color:var(--text3);text-align:center">Proveedor no encontrado.</div>';const cat=[...(p.catalogo||[])].sort((a,b)=>(b.totalGasto||0)-(a.totalGasto||0));if(!cat.length)return'<div style="padding:20px;color:var(--text3);text-align:center">Sin productos.</div>';return`<div style="padding:8px 20px 0"><div style="position:relative;margin-bottom:4px"><input class="form-input" type="search" placeholder="Buscar producto..." oninput="filterOrderProducts(this.value)" style="padding-left:36px;background:var(--bg2);font-size:14px"><svg style="position:absolute;left:11px;top:50%;transform:translateY(-50%);opacity:0.4" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg></div>${cat.map(pr=>{const ei=ex.find(i=>i.prodId===pr.id);const pc=parseFloat(pr.precio||0);const ep=ei?.precio||pc;return`<div class="order-prod-row" data-nombre="${escapeAttr((pr.nombre||'').toLowerCase())}" style="padding:12px 0;border-bottom:1px solid var(--border)"><div style="font-weight:600;font-size:14px;margin-bottom:6px">${escapeHTML(pr.nombre)}</div><div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px"><div><div style="font-size:9px;color:var(--text3);margin-bottom:2px">Precio</div><div class="price-wrap"><span class="price-prefix" style="left:5px;font-size:10px">S/.</span><input class="form-input precio-input" type="number" step="0.01" min="0" value="${ep>0?ep.toFixed(2):''}" data-prodid="${escapeAttr(pr.id)}" oninput="syncPrecio(this)" style="padding:6px 2px 6px 18px;font-size:12px;font-family:'Geist Mono',monospace"></div></div><div><div style="font-size:9px;color:var(--text3);margin-bottom:2px">Cant</div><input class="form-input qty-input" type="number" min="0" step="1" value="${ei?.qty||''}" data-prodid="${escapeAttr(pr.id)}" data-precio="${ep||pc}" oninput="syncQty(this)" style="padding:6px;text-align:center;font-size:12px;font-family:'Geist Mono',monospace"></div><div><div style="font-size:9px;color:var(--text3);margin-bottom:2px">Total</div><div class="price-wrap"><span class="price-prefix" style="left:5px;font-size:10px">S/.</span><input class="form-input total-input" type="number" step="0.01" min="0" value="${ei&&ei.qty&&ep?(ei.qty*ep).toFixed(2):''}" data-prodid="${escapeAttr(pr.id)}" oninput="syncTotal(this)" style="padding:6px 2px 6px 18px;font-size:12px;font-family:'Geist Mono',monospace"></div></div></div></div>`;}).join('')}</div>`;}
function syncPrecio(inp){const id=inp.dataset.prodid;const p=parseFloat(inp.value)||0;const qi=document.querySelector(`.qty-input[data-prodid="${id}"]`);if(qi)qi.dataset.precio=p;const ti=document.querySelector(`.total-input[data-prodid="${id}"]`);const q=parseFloat(qi?.value)||0;if(q>0&&ti)ti.value=(p*q).toFixed(2);renderOrderTotal();}
function syncQty(inp){const id=inp.dataset.prodid;const q=parseFloat(inp.value)||0;const pi=document.querySelector(`.precio-input[data-prodid="${id}"]`);const p=parseFloat(pi?.value)||0;inp.dataset.precio=p;const ti=document.querySelector(`.total-input[data-prodid="${id}"]`);if(p>0&&ti)ti.value=(p*q).toFixed(2);renderOrderTotal();}
function syncTotal(inp){const id=inp.dataset.prodid;const tot=parseFloat(inp.value)||0;const pi=document.querySelector(`.precio-input[data-prodid="${id}"]`);const qi=document.querySelector(`.qty-input[data-prodid="${id}"]`);const p=parseFloat(pi?.value)||0;const q=parseFloat(qi?.value)||0;if(p>0&&tot>0&&qi)qi.value=parseFloat((tot/p).toFixed(2));else if(q>0&&tot>0&&pi)pi.value=(tot/q).toFixed(2);renderOrderTotal();}
function filterOrderProducts(q){const t=q.toLowerCase().trim();document.querySelectorAll('.order-prod-row').forEach(r=>{r.style.display=(!t||r.dataset.nombre.includes(t))?'':'none';});}
function renderOrderTotal(){let t=0;document.querySelectorAll('.qty-input').forEach(i=>{t+=(parseFloat(i.value)||0)*parseFloat(i.dataset.precio||0);});const el=document.getElementById('orderTotal');if(el)el.textContent='S/. '+t.toFixed(2);}
function openQuickAddProd(pid){currentOrderProvId=pid;document.getElementById('overlayQuickProd')?.remove();const el=document.createElement('div');el.className='overlay open';el.id='overlayQuickProd';el.style.zIndex='400';el.innerHTML=`<div class="sheet" style="max-height:70dvh"><div class="sheet-handle"></div><div class="sheet-header"><span class="sheet-title">Nuevo producto</span><button class="btn btn-ghost" onclick="document.getElementById('overlayQuickProd').remove()">✕</button></div><div class="sheet-body"><div class="form-group"><label class="form-label">Nombre *</label><input class="form-input" id="qpNombre"></div><div class="form-group"><label class="form-label">Unidad</label><select class="form-select" id="qpUnidad"><option value="unidad">Unidad</option><option value="kg">Kg</option><option value="g">g</option><option value="litro">Litro</option><option value="ml">ml</option><option value="caja">Caja</option><option value="docena">Docena</option><option value="bolsa">Bolsa</option><option value="paquete">Paquete</option><option value="six">Six pack</option></select></div><div class="form-group"><label class="form-label">Precio</label><div class="price-wrap"><span class="price-prefix">S/.</span><input class="form-input price-input" id="qpPrecio" type="number" step="0.01"></div></div><div class="form-group"><label class="form-label">Cantidad</label><input class="form-input" id="qpQty" type="number" step="1" value="1"></div><button class="btn btn-primary btn-full" onclick="saveQuickProd()">Agregar</button></div></div>`;el.addEventListener('click',function(e){if(e.target===this)this.remove();});document.body.appendChild(el);}
function saveQuickProd(){const n=document.getElementById('qpNombre').value.trim();if(!n){toast('Nombre obligatorio');return;}const u=document.getElementById('qpUnidad').value;const p=parseFloat(document.getElementById('qpPrecio').value)||0;const q=parseFloat(document.getElementById('qpQty').value)||1;const pv=DB.proveedores.find(x=>x.id===currentOrderProvId);if(!pv.catalogo)pv.catalogo=[];const np={id:uid(),nombre:n,unidad:u,precio:p,totalQty:0,totalGasto:0};pv.catalogo.push(np);saveDB();document.getElementById('overlayQuickProd')?.remove();_renderOrderSheet(pv.id,[]);toast('Producto agregado ✓');}
function saveOrder(est,pid){const items=[];document.querySelectorAll('.qty-input').forEach(i=>{const pi=document.querySelector(`.precio-input[data-prodid="${i.dataset.prodid}"]`);items.push({prodId:i.dataset.prodid,nombre:i.dataset.nombre||'',unidad:i.dataset.unidad||'',precio:pi?parseFloat(pi.value)||0:parseFloat(i.dataset.precio)||0,qty:parseFloat(i.value)||0});});if(!items.some(i=>i.qty>0)){toast('Agrega al menos una cantidad');return;}if(currentOrderId){Object.assign(DB.pedidos.find(x=>x.id===currentOrderId),{items,estado:est,fecha:Date.now()});}else{DB.pedidos.push({id:uid(),proveedorId:pid,items,estado:est,fecha:Date.now()});}saveDB();closeSheet('overlayOrder');renderPedidos();toast(est==='pendiente'?'Pedido guardado':'Borrador guardado');}
function openOrderDetail(oid){const o=DB.pedidos.find(x=>x.id===oid);if(!o)return;currentOrderId=oid;const p=DB.proveedores.find(x=>x.id===o.proveedorId);const t=calcOrderTotal(o);const f=new Date(o.fecha).toLocaleDateString('es-PE',{day:'2-digit',month:'long',year:'numeric'});document.getElementById('sheetOrderDetail').innerHTML=`<div class="sheet-handle"></div><div class="sheet-header"><span class="sheet-title">${escapeHTML(p?.nombre||'Pedido')}</span><button class="btn btn-ghost" onclick="closeSheet('overlayOrderDetail')">✕</button></div><div class="sheet-body"><div style="display:flex;justify-content:space-between;margin-bottom:18px"><div><div style="font-size:13px;color:var(--text3)">${f}</div><div style="font-size:13px;color:var(--text2)">${o.estado==='pendiente'?'Pendiente':'Borrador'}</div></div><div class="money" style="font-size:26px">S/. ${t.toFixed(2)}</div></div>${o.items.filter(i=>i.qty>0).map(i=>`<div class="order-product"><div class="order-info"><div class="order-name">${escapeHTML(i.nombre)}</div><div class="order-meta">S/. ${parseFloat(i.precio||0).toFixed(2)} / ${escapeHTML(i.unidad)}</div></div><div style="text-align:right"><span class="money">${i.qty} ${escapeHTML(i.unidad)}</span><div class="money" style="font-size:12px;color:var(--text3)">S/. ${(i.qty*i.precio).toFixed(2)}</div></div></div>`).join('')}<div style="margin-top:20px;display:flex;flex-direction:column;gap:10px"><button class="btn btn-secondary btn-full" onclick="exportOrderDetailPng('${oid}')">Exportar</button><button class="btn btn-secondary btn-full" onclick="closeSheet('overlayOrderDetail');editOrder('${oid}')">Editar</button>${o.estado==='pendiente'?`<button class="btn btn-primary btn-full" onclick="confirmCompra('${oid}')">Registrar compra</button>`:`<button class="btn btn-secondary btn-full" onclick="markPendiente('${oid}')">Marcar pendiente</button>`}<button class="btn btn-danger btn-full" onclick="deleteOrder('${oid}')">Eliminar</button></div></div>`;openSheet('overlayOrderDetail');}
function editOrder(oid){const o=DB.pedidos.find(x=>x.id===oid);if(!o)return;currentOrderId=oid;currentOrderProvId=o.proveedorId;_renderOrderSheet(o.proveedorId,o.items);openSheet('overlayOrder');}
function markPendiente(oid){DB.pedidos.find(x=>x.id===oid).estado='pendiente';saveDB();closeSheet('overlayOrderDetail');renderPedidos();toast('Marcado pendiente');}
function deleteOrder(oid){confirm_('Eliminar','¿Eliminar este pedido?',()=>{DB.pedidos=DB.pedidos.filter(x=>x.id!==oid);saveDB();closeSheet('overlayOrderDetail');renderPedidos();toast('Eliminado');});}
function confirmCompra(oid){const o=DB.pedidos.find(x=>x.id===oid);const items=o.items.filter(i=>i.qty>0);document.getElementById('sheetOrderDetail').innerHTML=`<div class="sheet-handle"></div><div class="sheet-header"><span class="sheet-title">Confirmar compra</span><button class="btn btn-ghost" onclick="openOrderDetail('${oid}')">←</button></div><div class="sheet-body"><div style="font-size:14px;color:var(--text2);margin-bottom:18px">Ajusta los precios reales:</div>${items.map(i=>`<div style="margin-bottom:16px"><div style="font-weight:600;margin-bottom:6px">${escapeHTML(i.nombre)} — ${i.qty} ${escapeHTML(i.unidad)}</div><div class="price-wrap"><span class="price-prefix">S/.</span><input class="form-input price-input" type="number" step="0.01" value="${parseFloat(i.precio||0).toFixed(2)}" data-prodid="${escapeAttr(i.prodId)}" data-qty="${i.qty}" data-nombre="${escapeAttr(i.nombre)}" data-unidad="${escapeAttr(i.unidad)}" oninput="updateConfirmTotal()"></div></div>`).join('')}<div class="form-group"><label class="form-label">Nota</label><textarea class="form-textarea" id="compraNote"></textarea></div><div style="display:flex;justify-content:space-between;padding:14px 0;border-top:1px solid var(--border)"><span>Total</span><span class="money" style="font-size:22px" id="confirmTotal">S/. 0.00</span></div><button class="btn btn-primary btn-full" onclick="finalizarCompra('${oid}')">Registrar en historial</button></div>`;setTimeout(updateConfirmTotal,50);}
function updateConfirmTotal(){let t=0;document.querySelectorAll('[data-qty]').forEach(i=>{t+=parseFloat(i.value||0)*parseFloat(i.dataset.qty||0);});const el=document.getElementById('confirmTotal');if(el)el.textContent='S/. '+t.toFixed(2);}
function finalizarCompra(oid){const o=DB.pedidos.find(x=>x.id===oid);const p=DB.proveedores.find(x=>x.id===o.proveedorId);const nota=document.getElementById('compraNote')?.value.trim()||'';const items=[];let total=0;document.querySelectorAll('[data-qty]').forEach(i=>{const pr=parseFloat(i.value||0);const q=parseFloat(i.dataset.qty||0);items.push({prodId:i.dataset.prodid,nombre:i.dataset.nombre,unidad:i.dataset.unidad,precio:pr,precioVenta:0,qty:q});total+=pr*q;if(p){const cp=(p.catalogo||[]).find(x=>x.id===i.dataset.prodid);if(cp){cp.precio=pr;cp.totalQty=(cp.totalQty||0)+q;cp.totalGasto=(cp.totalGasto||0)+(pr*q);}}});DB.historial.push({id:uid(),proveedorId:o.proveedorId,items,total,nota,fecha:Date.now()});DB.pedidos=DB.pedidos.filter(x=>x.id!==oid);saveDB();closeSheet('overlayOrderDetail');renderPedidos();renderDashboard();toast('Compra registrada ✓');}

// ── HISTORIAL ──
function clearHistFiltro(){document.getElementById('histDesde').value='';document.getElementById('histHasta').value='';document.getElementById('searchHist').value='';renderHistorial();}
function renderHistorial(){const q=document.getElementById('searchHist').value.toLowerCase();const dv=document.getElementById('histDesde').value;const hv=document.getElementById('histHasta').value;const pl=(s,e)=>{const[y,m,d]=s.split('-').map(Number);return e?new Date(y,m-1,d,23,59,59).getTime():new Date(y,m-1,d).getTime();};const d=dv?pl(dv,false):null;const h=hv?pl(hv,true):null;let l=[...DB.historial].sort((a,b)=>b.fecha-a.fecha).filter(x=>{const p=DB.proveedores.find(y=>y.id===x.proveedorId);return(!q||(p?.nombre||'').toLowerCase().includes(q))&&(!d||x.fecha>=d)&&(!h||x.fecha<=h);});const b=document.getElementById('histTotalBanner');if((d||h)&&l.length){const t=l.reduce((s,x)=>s+(x.total||0),0);b.style.display='flex';b.innerHTML=`<span>${l.length} compras</span><span class="money">S/. ${t.toFixed(2)}</span>`;}else{b.style.display='none';}const el=document.getElementById('listHistorial');if(!l.length){el.innerHTML='<div class="empty-state"><div class="empty-icon">📦</div><div class="empty-text">Sin compras.</div></div>';return;}el.innerHTML=l.map(x=>{const p=DB.proveedores.find(y=>y.id===x.proveedorId);const f=new Date(x.fecha).toLocaleDateString('es-PE',{day:'2-digit',month:'short'});return`<div class="hist-card" onclick="openHistDetail('${escapeAttr(x.id)}')"><div class="hist-top"><div><div class="hist-provider">${escapeHTML(p?.nombre||'?')}</div><div class="hist-date">${f}</div></div><div class="hist-total">S/. ${parseFloat(x.total||0).toFixed(2)}</div></div></div>`;}).join('');}
function openHistDetail(hid){const h=DB.historial.find(x=>x.id===hid);if(!h)return;const p=DB.proveedores.find(x=>x.id===h.proveedorId);const f=new Date(h.fecha).toLocaleDateString('es-PE',{day:'2-digit',month:'long',year:'numeric'});const it=(h.items||[]).filter(i=>i.qty>0);const tv=it.reduce((s,i)=>s+(i.qty||0)*(i.precioVenta||0),0);const tc=h.total||0;const mg=tv-tc;renderHistDetailSheet(h,p,f,it,tc,tv,mg);openSheet('overlayHistDetail');}
function renderHistDetailSheet(h,p,f,it,tc,tv,mg){const mc=mg>0?'margen-positivo':mg<0?'margen-negativo':'';document.getElementById('sheetHistDetail').innerHTML=`<div class="sheet-handle"></div><div class="sheet-header"><span class="sheet-title">${escapeHTML(p?.nombre||'Compra')}</span><button class="btn btn-ghost" onclick="closeSheet('overlayHistDetail')">✕</button></div><div class="sheet-body"><div style="display:flex;justify-content:space-between;margin-bottom:${h.nota?'10':'20'}px"><div><div style="font-size:14px;color:var(--text3)">${f}</div>${h.nota?`<div style="font-size:12px;color:var(--text2);margin-top:4px">📝 ${escapeHTML(h.nota)}</div>`:''}</div><div class="money" style="font-size:26px">S/. ${tc.toFixed(2)}</div></div>${it.map(i=>{const sc=(i.qty||0)*(i.precio||0);const sv=(i.qty||0)*(i.precioVenta||0);const m=sv-sc;const mp=sc>0?((m/sc)*100):0;const cls=m>0?'margen-positivo':m<0?'margen-negativo':'';return`<div style="padding:10px 0;border-bottom:1px solid var(--border)"><div style="font-weight:600;font-size:14px;margin-bottom:4px">${escapeHTML(i.nombre)} <span style="font-weight:400;color:var(--text3);font-size:12px">x${i.qty} ${escapeHTML(i.unidad)}</span></div><div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px;font-size:12px"><div><span style="color:var(--text3)">Compra:</span> <span class="money">S/.${(i.precio||0).toFixed(2)}</span></div><div><span style="color:var(--text3)">Venta:</span> <span class="money">${(i.precioVenta||0)>0?'S/.${(i.precioVenta||0).toFixed(2)}':'—'}</span></div><div class="${cls}"><span class="money">${(i.precioVenta||0)>0?(m>=0?'+':'')+'S/.${m.toFixed(2)} (${mp>=0?'+':''}${mp.toFixed(0)}%)':'—'}</span></div></div></div>`;}).join('')}${tv>0?`<div style="display:flex;justify-content:space-between;padding:12px 0;border-top:2px solid var(--border);margin-top:8px"><div><div style="font-size:10px;color:var(--text3)">Compra total</div><div class="money" style="font-size:16px">S/. ${tc.toFixed(2)}</div></div><div><div style="font-size:10px;color:var(--text3)">Venta total</div><div class="money" style="font-size:16px">S/. ${tv.toFixed(2)}</div></div><div><div style="font-size:10px;color:var(--text3)">Margen</div><div class="money ${mc}" style="font-size:18px;font-weight:700">${mg>=0?'+':''}S/. ${mg.toFixed(2)}</div></div></div>`:''}<div style="margin-top:20px;display:flex;flex-direction:column;gap:10px"><button class="btn btn-primary btn-full" onclick="openHistEdit('${h.id}')">✏️ Editar precios</button><button class="btn btn-secondary btn-full" onclick="exportHistPng('${h.id}')">Exportar</button><button class="btn btn-danger btn-full" onclick="deleteHist('${h.id}')">Eliminar</button></div></div>`;}
function openHistEdit(hid){const h=DB.historial.find(x=>x.id===hid);if(!h)return;const it=(h.items||[]).filter(i=>i.qty>0);document.getElementById('sheetHistDetail').innerHTML=`<div class="sheet-handle"></div><div class="sheet-header"><span class="sheet-title">Editar precios</span><button class="btn btn-ghost" onclick="openHistDetail('${hid}')">←</button></div><div class="sheet-body"><div style="font-size:14px;color:var(--text2);margin-bottom:18px">Ajustá los precios de compra y venta:</div>${it.map((i,idx)=>`<div style="margin-bottom:18px;padding-bottom:14px;border-bottom:1px solid var(--border)"><div style="font-weight:600;margin-bottom:8px">${escapeHTML(i.nombre)} — x${i.qty} ${escapeHTML(i.unidad)}</div><div style="display:flex;gap:8px;align-items:center"><div style="flex:1"><div style="font-size:9px;color:var(--text3);margin-bottom:3px">Precio compra</div><div class="price-wrap"><span class="price-prefix" style="left:8px;font-size:11px">S/.</span><input class="form-input price-input he-pc" type="number" step="0.01" value="${(i.precio||0).toFixed(2)}" data-idx="${idx}" style="padding:8px 8px 8px 28px;font-size:13px"></div></div><div style="flex:1"><div style="font-size:9px;color:var(--text3);margin-bottom:3px">Precio venta</div><div class="price-wrap"><span class="price-prefix" style="left:8px;font-size:11px">S/.</span><input class="form-input price-input he-pv" type="number" step="0.01" value="${(i.precioVenta||0)>0?(i.precioVenta||0).toFixed(2):''}" data-idx="${idx}" placeholder="0.00" style="padding:8px 8px 8px 28px;font-size:13px"></div></div></div></div>`).join('')}<button class="btn btn-primary btn-full" onclick="saveHistEdit('${hid}')">Guardar cambios</button></div>`;}
function saveHistEdit(hid){const h=DB.historial.find(x=>x.id===hid);if(!h)return;document.querySelectorAll('.he-pc').forEach(i=>{const idx=parseInt(i.dataset.idx);if(!isNaN(idx)&&h.items[idx]){const pv=document.querySelector(`.he-pv[data-idx="${idx}"]`);h.items[idx].precio=parseFloat(i.value)||0;h.items[idx].precioVenta=parseFloat(pv?.value)||0;}});h.total=(h.items||[]).reduce((s,i)=>s+(i.qty||0)*(i.precio||0),0);saveDB();openHistDetail(hid);toast('Precios actualizados ✓');}
function deleteHist(hid){confirm_('Eliminar','¿Eliminar esta compra?',()=>{DB.historial=DB.historial.filter(x=>x.id!==hid);saveDB();closeSheet('overlayHistDetail');renderHistorial();toast('Eliminado');});}
function getLastMonthQty(pid,prid){const a=Date.now()-30*24*60*60*1000;return DB.historial.filter(h=>h.proveedorId===pid&&h.fecha>=a).reduce((s,h)=>{const i=h.items.find(x=>x.prodId===prid);return s+(i?.qty||0);},0);}

// ── EXPORTAR PNG ──
async function exportOrderPng(pid){const p=DB.proveedores.find(x=>x.id===pid);const it=[];document.querySelectorAll('.qty-input').forEach(i=>{const q=parseFloat(i.value)||0;if(!q)return;const pi=document.querySelector(`.precio-input[data-prodid="${i.dataset.prodid}"]`);it.push({nombre:i.dataset.nombre||'',unidad:i.dataset.unidad||'',qty:q,precio:pi?parseFloat(pi.value)||0:0});});if(!it.length){toast('Agrega productos');return;}await genPng(p?.nombre||'Pedido',it);}
async function exportOrderDetailPng(oid){const o=DB.pedidos.find(x=>x.id===oid);if(!o)return;const p=DB.proveedores.find(x=>x.id===o.proveedorId);await genPng(p?.nombre||'Pedido',o.items.filter(i=>i.qty>0));}
async function exportHistPng(hid){const h=DB.historial.find(x=>x.id===hid);if(!h)return;const p=DB.proveedores.find(x=>x.id===h.proveedorId);await genPng(p?.nombre||'Compra',h.items.filter(i=>i.qty>0));}
async function genPng(tit,items){toast('Generando...');const tot=items.reduce((s,i)=>s+i.qty*(i.precio||0),0);const f=new Date().toLocaleDateString('es-PE',{day:'2-digit',month:'long',year:'numeric'});const d=document.createElement('div');d.style.cssText='position:fixed;left:-9999px;top:0;width:390px;background:#fff;padding:28px 24px;font-family:sans-serif;';d.innerHTML=`<div style="display:flex;justify-content:space-between;margin-bottom:20px;padding-bottom:16px;border-bottom:2px solid #1a1917"><div><div style="font-size:22px;font-weight:700">${tit}</div><div style="font-size:13px;color:#888">${f}</div></div></div>${items.map((i,idx)=>`<div style="display:flex;justify-content:space-between;padding:10px 0;border-bottom:1px solid #eee"><div><span style="font-weight:600">${escapeHTML(i.nombre)}</span> <span style="font-size:12px;color:#888">${escapeHTML(i.unidad)}${(i.precio||0)>0?` · S/.${(i.precio||0).toFixed(2)}`:''}</span></div><div style="text-align:right"><span style="font-size:20px;font-weight:700">${i.qty}</span></div></div>`).join('')}<div style="display:flex;justify-content:space-between;padding-top:16px;margin-top:4px"><span>${items.length} productos</span>${tot>0?`<span style="font-size:20px;font-weight:700">S/. ${tot.toFixed(2)}</span>`:''}</div>`;document.body.appendChild(d);try{const c=await html2canvas(d,{scale:2,backgroundColor:'#fff'});const a=document.createElement('a');a.download=`${tit.replace(/\s+/g,'-').toLowerCase()}.png`;a.href=c.toDataURL('image/png');a.click();toast('Descargado ✓');}catch(e){toast('Error');}document.body.removeChild(d);}

// ── REPORTES ──
let _rd=30;
function setReportePeriodo(d,btn){_rd=d;document.querySelectorAll('[id^=rBtn]').forEach(b=>{b.style.background='var(--bg2)';b.style.color='var(--text2)';b.style.border='1px solid var(--border)';});btn.style.background='var(--accent-bg)';btn.style.color='var(--accent-text)';btn.style.border='none';renderReportes();}
function renderReportes(){const el=document.getElementById('reportesContent');const desde=Date.now()-_rd*24*60*60*1000;const c=DB.historial.filter(h=>h.fecha>=desde);if(!c.length){el.innerHTML='<div class="empty-state">Sin compras.</div>';return;}const pp={};c.forEach(h=>{if(!pp[h.proveedorId])pp[h.proveedorId]={total:0};pp[h.proveedorId].total+=h.total||0;});const tg=Object.values(pp).reduce((s,v)=>s+v.total,0);const pr=Object.entries(pp).sort((a,b)=>b[1].total-a[1].total);const po={};c.forEach(h=>{h.items.filter(i=>i.qty>0).forEach(i=>{if(!po[i.nombre])po[i.nombre]={qty:0,gasto:0,unidad:i.unidad};po[i.nombre].qty+=i.qty;po[i.nombre].gasto+=i.qty*(i.precio||0);});});const pk=Object.entries(po).sort((a,b)=>b[1].gasto-a[1].gasto).slice(0,10);el.innerHTML=`<div style="background:var(--accent-bg);color:var(--accent-text);border-radius:16px;padding:20px;margin-bottom:20px"><div style="font-size:12px;opacity:0.7">GASTO — ${_rd} DÍAS</div><div style="font-size:36px;font-weight:700;font-family:'Geist Mono',monospace">S/. ${tg.toFixed(2)}</div></div><div style="font-size:11px;text-transform:uppercase;color:var(--text3);font-weight:700;margin-bottom:12px">Por proveedor</div>${pr.map(([pid,d])=>{const pv=DB.proveedores.find(x=>x.id===pid);const pct=tg>0?(d.total/tg*100):0;return`<div style="margin-bottom:12px"><div style="display:flex;justify-content:space-between;font-size:14px"><span>${escapeHTML(pv?.nombre||'?')}</span><span class="money">S/.${d.total.toFixed(2)}</span></div><div style="height:6px;background:var(--bg3);border-radius:3px"><div style="height:100%;width:${pct}%;background:var(--accent-bg);border-radius:3px"></div></div></div>`;}).join('')}<div style="font-size:11px;text-transform:uppercase;color:var(--text3);font-weight:700;margin:20px 0 12px">Top productos</div>${pk.map(([n,d],i)=>`<div style="display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px solid var(--border)"><span>${i+1}. ${escapeHTML(n)}</span><span class="money">S/.${d.gasto.toFixed(2)}</span></div>`).join('')}`;}

document.querySelectorAll('.overlay').forEach(o=>{o.addEventListener('click',function(e){if(e.target===this)this.classList.remove('open');});});
loadDB();
</script>
</body>

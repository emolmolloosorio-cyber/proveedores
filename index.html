<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Mi Bodega</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Geist+Mono:wght@400;500&family=Instrument+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{--bg:#ffffff;--bg2:#f7f7f6;--bg3:#f0efed;--border:#e5e4e1;--border2:#d4d3cf;--text:#1a1917;--text2:#6b6a67;--text3:#a8a7a3;--accent-bg:#1a1917;--accent-text:#ffffff;--danger:#c0392b;--danger-bg:#fdf2f2;--success:#27ae60;--nav-h:60px;}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
body{background:var(--bg);color:var(--text);font-family:'Instrument Sans',sans-serif;font-size:15px;min-height:100dvh;overflow-x:hidden;}
nav{position:fixed;bottom:0;left:0;right:0;height:var(--nav-h);background:rgba(255,255,255,0.94);backdrop-filter:blur(14px);border-top:1px solid var(--border);display:flex;z-index:100;}
.nav-btn{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;background:none;border:none;color:var(--text3);font-family:'Instrument Sans',sans-serif;font-size:10px;font-weight:600;letter-spacing:0.3px;cursor:pointer;transition:color 0.15s;}
.nav-btn.active{color:var(--text);}
.nav-btn svg{width:20px;height:20px;stroke-width:1.75;}
main{padding-bottom:calc(var(--nav-h) + 8px);min-height:100dvh;}
.section{display:none;}.section.active{display:block;}
.page-header{padding:52px 20px 14px;position:sticky;top:0;background:rgba(255,255,255,0.94);backdrop-filter:blur(14px);z-index:10;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:flex-end;}
.page-header h2{font-size:26px;font-weight:700;letter-spacing:-0.5px;}
.search-wrap{padding:12px 20px 4px;}
.search-input{width:100%;background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:10px 14px;color:var(--text);font-family:'Instrument Sans',sans-serif;font-size:15px;outline:none;transition:border-color 0.15s;}
.search-input::placeholder{color:var(--text3);}.search-input:focus{border-color:var(--border2);}
.list{padding:8px 20px;display:flex;flex-direction:column;}
.card{background:var(--bg);padding:14px 4px;cursor:pointer;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:12px;transition:background 0.1s;}
.card:first-child{border-top:1px solid var(--border);}.card:active{background:var(--bg2);}
.card-body{flex:1;min-width:0;}.card-title{font-size:16px;font-weight:600;}
.card-sub{font-size:13px;color:var(--text2);margin-top:3px;}
.card-tags{display:flex;gap:6px;margin-top:8px;flex-wrap:wrap;}
.tag{font-size:11px;padding:3px 9px;border-radius:20px;font-weight:600;}
.tag-visit{background:#e8f4fd;color:#1a6fa8;}.tag-delivery{background:#e8f7ef;color:#1a7a45;}.tag-count{background:var(--bg3);color:var(--text2);}
.chevron{color:var(--text3);flex-shrink:0;}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;padding:11px 18px;border-radius:10px;font-family:'Instrument Sans',sans-serif;font-size:14px;font-weight:600;cursor:pointer;border:none;transition:opacity 0.15s,transform 0.1s;}
.btn:active{transform:scale(0.97);opacity:0.75;}
.btn-primary{background:var(--accent-bg);color:var(--accent-text);}
.btn-secondary{background:var(--bg2);color:var(--text);border:1px solid var(--border);}
.btn-danger{background:var(--danger-bg);color:var(--danger);border:1px solid #f5c6c3;}
.btn-ghost{background:none;color:var(--text2);padding:8px;border:none;}
.btn-full{width:100%;}.btn-sm{padding:8px 14px;font-size:13px;border-radius:8px;}
.fab{position:fixed;bottom:calc(var(--nav-h) + 14px);right:20px;width:48px;height:48px;border-radius:50%;background:var(--accent-bg);color:var(--accent-text);font-size:24px;border:none;display:flex;align-items:center;justify-content:center;cursor:pointer;box-shadow:0 2px 12px rgba(0,0,0,0.18);z-index:50;transition:transform 0.15s;}
.fab:active{transform:scale(0.92);}
.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.3);z-index:200;align-items:flex-end;}
.overlay.open{display:flex;}
.sheet{background:var(--bg);border-radius:20px 20px 0 0;width:100%;max-height:93dvh;overflow-y:auto;padding-bottom:32px;animation:slideUp 0.22s ease;display:flex;flex-direction:column;}
@keyframes slideUp{from{transform:translateY(50px);opacity:0;}to{transform:translateY(0);opacity:1;}}
.sheet-handle{width:36px;height:4px;background:var(--border2);border-radius:2px;margin:10px auto 0;flex-shrink:0;}
.sheet-header{padding:14px 20px 12px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--border);position:sticky;top:0;background:var(--bg);z-index:5;flex-shrink:0;}
.sheet-title{font-size:18px;font-weight:700;letter-spacing:-0.3px;}
.sheet-body{padding:20px;}
.form-group{margin-bottom:18px;}
.form-label{font-size:11px;color:var(--text2);font-weight:700;text-transform:uppercase;letter-spacing:0.7px;margin-bottom:7px;display:block;}
.form-input,.form-textarea,.form-select{width:100%;background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:12px 14px;color:var(--text);font-family:'Instrument Sans',sans-serif;font-size:15px;outline:none;transition:border-color 0.15s;}
.form-input:focus,.form-textarea:focus,.form-select:focus{border-color:var(--border2);background:var(--bg);}
.form-textarea{resize:none;min-height:80px;line-height:1.5;}
.form-select{appearance:none;}
.days-picker{display:flex;gap:7px;flex-wrap:wrap;}
.day-chip{padding:7px 12px;border-radius:8px;background:var(--bg2);border:1px solid var(--border);color:var(--text2);font-size:13px;font-weight:600;cursor:pointer;transition:all 0.12s;user-select:none;}
.day-chip.selected{background:var(--text);color:#fff;border-color:var(--text);}
.detail-header{padding:18px 20px 16px;border-bottom:1px solid var(--border);display:flex;align-items:flex-start;gap:10px;}
.back-btn{background:none;border:none;color:var(--text2);cursor:pointer;padding:2px;flex-shrink:0;margin-top:3px;}
.detail-info{flex:1;}.detail-name{font-size:22px;font-weight:700;letter-spacing:-0.4px;line-height:1.15;}
.detail-phone{color:var(--text2);font-size:14px;margin-top:4px;}
.detail-section{padding:16px 20px;border-bottom:1px solid var(--border);}
.detail-section-title{font-size:11px;text-transform:uppercase;letter-spacing:0.8px;color:var(--text3);font-weight:700;margin-bottom:12px;}
.info-row{display:flex;justify-content:space-between;align-items:center;padding:7px 0;}
.info-label{color:var(--text2);font-size:14px;}.info-value{font-size:14px;font-weight:500;text-align:right;max-width:60%;}
.obs-box{background:var(--bg2);border-radius:10px;padding:12px 14px;font-size:14px;color:var(--text2);line-height:1.6;}
.product-item{display:flex;align-items:center;padding:12px 0;border-bottom:1px solid var(--border);gap:10px;}
.product-item:last-child{border-bottom:none;}
.product-info{flex:1;min-width:0;}.product-name{font-weight:600;font-size:15px;}
.product-unit{font-size:12px;color:var(--text3);margin-top:2px;}
.product-price{font-family:'Geist Mono',monospace;font-size:15px;color:var(--text);white-space:nowrap;}
.product-actions{display:flex;gap:2px;}
.order-product{display:flex;align-items:center;padding:12px 0;border-bottom:1px solid var(--border);gap:10px;}
.order-product:last-child{border-bottom:none;}
.order-info{flex:1;min-width:0;}.order-name{font-weight:600;font-size:14px;}
.order-meta{font-size:12px;color:var(--text3);margin-top:2px;font-family:'Geist Mono',monospace;}
.total-bar{position:sticky;bottom:0;background:rgba(255,255,255,0.96);backdrop-filter:blur(10px);border-top:1px solid var(--border);padding:14px 20px;display:flex;align-items:center;justify-content:space-between;gap:12px;flex-shrink:0;}
.total-label{color:var(--text2);font-size:13px;}
.total-amount{font-family:'Geist Mono',monospace;font-size:22px;color:var(--text);}
.day-tabs{display:flex;overflow-x:auto;gap:6px;padding:12px 20px;scrollbar-width:none;}
.day-tabs::-webkit-scrollbar{display:none;}
.day-tab{flex-shrink:0;padding:7px 14px;border-radius:8px;background:var(--bg2);border:1px solid var(--border);color:var(--text2);font-size:13px;font-weight:600;cursor:pointer;transition:all 0.12s;}
.day-tab.active{background:var(--text);color:#fff;border-color:var(--text);}
.day-block{padding:0 20px 16px;}
.day-block-title{font-size:11px;text-transform:uppercase;letter-spacing:0.8px;color:var(--text3);font-weight:700;padding:14px 0 8px;}
.hist-card{background:var(--bg);padding:14px 4px;cursor:pointer;border-bottom:1px solid var(--border);transition:background 0.1s;}
.hist-card:first-child{border-top:1px solid var(--border);}.hist-card:active{background:var(--bg2);}
.hist-top{display:flex;justify-content:space-between;align-items:flex-start;}
.hist-provider{font-size:16px;font-weight:600;}
.hist-total{font-family:'Geist Mono',monospace;font-size:16px;color:var(--text);}
.hist-date{font-size:12px;color:var(--text3);margin-top:3px;}
.hist-items{font-size:13px;color:var(--text2);margin-top:6px;}
.section-tabs{display:flex;padding:0 20px;border-bottom:1px solid var(--border);}
.section-tab{flex:1;padding:11px 0;text-align:center;font-size:13px;font-weight:600;color:var(--text3);cursor:pointer;border-bottom:2px solid transparent;transition:all 0.15s;}
.section-tab.active{color:var(--text);border-bottom-color:var(--text);}
.empty-state{text-align:center;padding:56px 20px;}
.empty-icon{font-size:36px;margin-bottom:12px;opacity:0.4;}
.empty-text{font-size:15px;line-height:1.6;color:var(--text2);}
.price-wrap{position:relative;}
.price-prefix{position:absolute;left:14px;top:50%;transform:translateY(-50%);color:var(--text3);font-size:14px;font-family:'Geist Mono',monospace;}
.price-input{padding-left:36px!important;font-family:'Geist Mono',monospace!important;}
.toast{position:fixed;top:20px;left:50%;transform:translateX(-50%) translateY(-70px);background:var(--text);color:#fff;padding:11px 18px;border-radius:10px;font-size:14px;font-weight:500;z-index:999;transition:transform 0.25s ease;white-space:nowrap;box-shadow:0 4px 16px rgba(0,0,0,0.15);}
.toast.show{transform:translateX(-50%) translateY(0);}
.confirm-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.35);z-index:300;align-items:center;justify-content:center;padding:24px;}
.confirm-overlay.open{display:flex;}
.confirm-box{background:var(--bg);border:1px solid var(--border);border-radius:18px;padding:24px;width:100%;max-width:320px;text-align:center;box-shadow:0 8px 32px rgba(0,0,0,0.1);}
.confirm-title{font-size:17px;font-weight:700;margin-bottom:8px;}
.confirm-text{color:var(--text2);font-size:14px;margin-bottom:20px;line-height:1.5;}
.confirm-actions{display:flex;gap:10px;}.confirm-actions .btn{flex:1;}
.no-data{color:var(--text3);font-size:14px;font-style:italic;padding:4px 0;}
.money{font-family:'Geist Mono',monospace;}
::-webkit-scrollbar{width:3px;}::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px;}
.dash-card{background:var(--bg2);border:1px solid var(--border);border-radius:16px;padding:18px;margin-bottom:12px;}
.dash-card-title{font-size:11px;text-transform:uppercase;letter-spacing:0.8px;color:var(--text3);font-weight:700;margin-bottom:10px;}
.dash-stat{font-size:32px;font-weight:700;font-family:'Geist Mono',monospace;letter-spacing:-1px;}
.dash-sub{font-size:13px;color:var(--text2);margin-top:4px;}
.autocomplete-wrap{position:relative;}
.autocomplete-dropdown{position:absolute;top:100%;left:0;right:0;background:var(--bg);border:1px solid var(--border);border-radius:10px;max-height:260px;overflow-y:auto;z-index:50;box-shadow:0 4px 16px rgba(0,0,0,0.1);display:none;}
.autocomplete-dropdown.show{display:block;}
.autocomplete-item{padding:10px 14px;cursor:pointer;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center;}
.autocomplete-item:last-child{border-bottom:none;}
.autocomplete-item:active,.autocomplete-item:hover{background:var(--bg2);}
.autocomplete-item .ac-name{font-weight:600;font-size:14px;}
.autocomplete-item .ac-meta{font-size:11px;color:var(--text3);margin-top:2px;}
.autocomplete-item .ac-price{font-family:'Geist Mono',monospace;font-size:13px;color:var(--text);white-space:nowrap;}
.ac-highlight{background:#fff3b0;border-radius:2px;padding:0 1px;}
.margen-positivo{color:#27ae60;}
.margen-negativo{color:#c0392b;}
</style>
</head>
<body>
<div class="toast" id="toast"></div>
<div class="confirm-overlay" id="confirmOverlay">
  <div class="confirm-box">
    <div class="confirm-title" id="confirmTitle"></div>
    <div class="confirm-text" id="confirmText"></div>
    <div class="confirm-actions">
      <button class="btn btn-secondary" onclick="closeConfirm()">Cancelar</button>
      <button class="btn btn-danger" id="confirmOk">Eliminar</button>
    </div>
  </div>
</div>
<main>
  <section class="section active" id="sec-dashboard"><div class="page-header"><h2>Mi Bodega</h2><button class="btn btn-ghost btn-sm" onclick="openBudgetSettings()" style="color:var(--text3);font-size:12px">⚙ Presupuesto</button></div><div id="dashContent" style="padding:16px 20px 100px"></div></section>
  <section class="section" id="sec-proveedores"><div class="page-header"><h2>Proveedores</h2></div><div class="search-wrap"><input class="search-input" type="search" placeholder="Buscar..." id="searchProv" oninput="renderProveedores()"></div><div class="list" id="listProveedores"></div><button class="fab" onclick="openProvForm()">+</button></section>
  <section class="section" id="sec-hoy"><div class="page-header"><h2>Semana</h2></div><div class="day-tabs" id="dayTabs"></div><div id="hoyContent"></div></section>
  <section class="section" id="sec-pedidos"><div class="page-header"><h2>Pedidos</h2></div><div class="section-tabs"><div class="section-tab active" onclick="switchPedidoTab('pendientes',this)">Pendientes</div><div class="section-tab" onclick="switchPedidoTab('borradores',this)">Borradores</div></div><div class="list" id="listPedidos" style="padding-top:12px"></div><button class="fab" onclick="openNewOrder()">+</button></section>
  <section class="section" id="sec-historial"><div class="page-header"><h2>Historial</h2></div><div style="padding:10px 20px 4px;display:flex;gap:8px"><div style="flex:1"><div style="font-size:10px;color:var(--text3);text-transform:uppercase;margin-bottom:4px">Desde</div><input class="form-input" type="date" id="histDesde" oninput="renderHistorial()" style="padding:8px 10px;font-size:13px"></div><div style="flex:1"><div style="font-size:10px;color:var(--text3);text-transform:uppercase;margin-bottom:4px">Hasta</div><input class="form-input" type="date" id="histHasta" oninput="renderHistorial()" style="padding:8px 10px;font-size:13px"></div><button class="btn btn-ghost btn-sm" onclick="clearHistFiltro()" style="padding:8px;color:var(--text3)">✕</button></div><div id="histTotalBanner" style="display:none;margin:4px 20px 0;background:var(--accent-bg);color:var(--accent-text);border-radius:10px;padding:10px 14px;font-size:13px"></div><div class="search-wrap"><input class="search-input" type="search" placeholder="Buscar proveedor..." id="searchHist" oninput="renderHistorial()"></div><div class="list" id="listHistorial"></div></section>
  <section class="section" id="sec-reportes"><div class="page-header"><h2>Reportes</h2></div><div style="padding:0 20px 8px;display:flex;gap:8px"><button class="btn btn-sm" id="rBtn30" onclick="setReportePeriodo(30,this)" style="background:var(--accent-bg);color:var(--accent-text);border-radius:20px;border:none">30 días</button><button class="btn btn-sm" id="rBtn60" onclick="setReportePeriodo(60,this)" style="background:var(--bg2);color:var(--text2);border-radius:20px;border:1px solid var(--border)">60 días</button><button class="btn btn-sm" id="rBtn90" onclick="setReportePeriodo(90,this)" style="background:var(--bg2);color:var(--text2);border-radius:20px;border:1px solid var(--border)">90 días</button></div><div id="reportesContent" style="padding:0 20px 100px"></div></section>
</main>
<nav>
  <button class="nav-btn active" onclick="goSection('dashboard',this)"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>Inicio</button>
  <button class="nav-btn" onclick="goSection('proveedores',this)"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>Proveedores</button>
  <button class="nav-btn" onclick="goSection('pedidos',this)"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M6 2 3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4z"/><line x1="3" y1="6" x2="21" y2="6"/><path d="M16 10a4 4 0 0 1-8 0"/></svg>Pedidos</button>
  <button class="nav-btn" onclick="goSection('historial',this)"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><polyline points="12 8 12 12 14 14"/><path d="M3.05 11a9 9 0 1 1 .5 4"/><polyline points="3 16 3 11 8 11"/></svg>Historial</button>
</nav>

<div class="overlay" id="overlayProvForm"><div class="sheet"><div class="sheet-handle"></div><div class="sheet-header"><span class="sheet-title" id="provFormTitle">Nuevo proveedor</span><button class="btn btn-ghost" onclick="closeSheet('overlayProvForm')">✕</button></div><div class="sheet-body"><div class="form-group"><label class="form-label">Nombre *</label><input class="form-input" id="fProvNombre" placeholder="Nombre del proveedor"></div><div class="form-group"><label class="form-label">Teléfono</label><input class="form-input" id="fProvTel" type="tel" placeholder="999 999 999"></div><div class="form-group"><label class="form-label">Días de visita</label><div class="days-picker" id="dpVisita"></div></div><div class="form-group"><label class="form-label">Días de entrega</label><div class="days-picker" id="dpEntrega"></div></div><div class="form-group"><label class="form-label">Observaciones</label><textarea class="form-textarea" id="fProvObs" placeholder="Notas adicionales..."></textarea></div><button class="btn btn-primary btn-full" onclick="saveProveedor()">Guardar</button></div></div></div>
<div class="overlay" id="overlayProvDetail"><div class="sheet" id="sheetProvDetail"></div></div>
<div class="overlay" id="overlayCatForm"><div class="sheet"><div class="sheet-handle"></div><div class="sheet-header"><span class="sheet-title" id="catFormTitle">Producto</span><button class="btn btn-ghost" onclick="closeSheet('overlayCatForm')">✕</button></div><div class="sheet-body"><div class="form-group"><label class="form-label">Nombre *</label><input class="form-input" id="fProdNombre" placeholder="Ej: Inca Kola 1.5L"></div><div class="form-group"><label class="form-label">Unidad</label><select class="form-select" id="fProdUnidad"><option value="unidad">Unidad</option><option value="kg">Kg</option><option value="g">g</option><option value="litro">Litro</option><option value="ml">ml</option><option value="caja">Caja</option><option value="docena">Docena</option><option value="bolsa">Bolsa</option><option value="paquete">Paquete</option><option value="six">Six pack</option></select></div><div class="form-group"><label class="form-label">Precio (S/.)</label><div class="price-wrap"><span class="price-prefix">S/.</span><input class="form-input price-input" id="fProdPrecio" type="number" step="0.01" min="0" placeholder="0.00"></div></div><button class="btn btn-primary btn-full" onclick="saveProd()">Guardar</button></div></div></div>
<div class="overlay" id="overlayOrder"><div class="sheet" id="sheetOrder" style="max-height:96dvh"></div></div>
<div class="overlay" id="overlayOrderDetail"><div class="sheet" id="sheetOrderDetail"></div></div>
<div class="overlay" id="overlayHistDetail"><div class="sheet" id="sheetHistDetail"></div></div>
<div class="overlay" id="overlayBudget"><div class="sheet"><div class="sheet-handle"></div><div class="sheet-header"><span class="sheet-title">Presupuesto mensual</span><button class="btn btn-ghost" onclick="closeSheet('overlayBudget')">✕</button></div><div class="sheet-body"><div style="font-size:14px;color:var(--text2);margin-bottom:20px">Define cuánto querés gastar por mes.</div><div class="form-group"><label class="form-label">Presupuesto (S/.)</label><div class="price-wrap"><span class="price-prefix">S/.</span><input class="form-input price-input" id="fBudget" type="number" step="1" min="0" placeholder="0"></div></div><button class="btn btn-primary btn-full" onclick="saveBudget()">Guardar</button><button class="btn btn-ghost btn-full" onclick="saveBudget(true)" style="margin-top:8px;color:var(--text3)">Quitar presupuesto</button></div></div></div>
<div class="overlay" id="overlayFaltantes"><div class="sheet"><div class="sheet-handle"></div><div class="sheet-header"><span class="sheet-title">📋 Faltantes</span><button class="btn btn-ghost" onclick="closeSheet('overlayFaltantes')">✕</button></div><div class="sheet-body"><div style="font-size:13px;color:var(--text2);margin-bottom:16px">Productos que te faltan en la bodega.</div><div class="form-group"><label class="form-label">Producto *</label><div class="autocomplete-wrap"><input class="form-input" id="fFaltanteNombre" placeholder="Escribí para buscar en catálogos..." autocomplete="off" oninput="buscarEnCatalogos(this.value)"><div class="autocomplete-dropdown" id="acDropdown"></div></div></div><div class="form-group"><label class="form-label">Cantidad (opcional)</label><input class="form-input" id="fFaltanteQty" placeholder="Ej: 5 kg, 3 unids..."></div><button class="btn btn-primary btn-full" onclick="addFaltante()">Agregar</button><div id="faltantesList" style="margin-top:20px"></div></div></div></div>
